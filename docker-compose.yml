version: '3.9'

services:
  ollama:
    image: ollama/ollama:latest
    container_name: gemma_ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_NUM_PARALLEL=1
      - OLLAMA_MAX_LOADED_MODELS=1
      - OLLAMA_FLASH_ATTENTION=1
    # Uncomment for GPU support:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 15s
      timeout: 10s
      retries: 6
      start_period: 30s

  # One-shot container: pull the model then exit.
  # Runs before the API starts, only if model not already present.
  model-puller:
    image: ollama/ollama:latest
    container_name: gemma_model_puller
    restart: "no"
    depends_on:
      ollama:
        condition: service_healthy
    volumes:
      - ollama_data:/root/.ollama
    entrypoint: ["ollama", "pull", "${OLLAMA_MODEL:-gemma:2b}"]
    environment:
      - OLLAMA_HOST=http://ollama:11434

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gemma_api
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file: .env
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
    depends_on:
      model-puller:
        condition: service_completed_successfully
    deploy:
      resources:
        limits:
          memory: 300M
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"

volumes:
  ollama_data:
    driver: local
