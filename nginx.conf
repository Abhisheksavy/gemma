##############################################################################
# Nginx reverse proxy for Gemma API
# Place at /etc/nginx/sites-available/gemma and symlink to sites-enabled/
##############################################################################

# Limit request body (64 KB is plenty for a chat message)
client_max_body_size 64k;

# Rate limiting zone — 10 req/s per IP burst 20
limit_req_zone $binary_remote_addr zone=chat_limit:10m rate=10r/s;

upstream gemma_api {
    server 127.0.0.1:3000;
    keepalive 16;
}

server {
    listen 80;
    server_name your-domain.com;          # <-- replace with your domain or IP

    # Redirect HTTP → HTTPS (uncomment after running certbot)
    # return 301 https://$host$request_uri;

    location /api/ {
        limit_req zone=chat_limit burst=20 nodelay;

        proxy_pass         http://gemma_api;
        proxy_http_version 1.1;
        proxy_set_header   Connection       "";
        proxy_set_header   Host             $host;
        proxy_set_header   X-Real-IP        $remote_addr;
        proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_read_timeout  90s;
        proxy_send_timeout  90s;
        proxy_connect_timeout 5s;
    }

    # Block everything else
    location / {
        return 404;
    }
}

